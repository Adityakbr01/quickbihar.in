name: Deploy Production

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    env:
      SERVER_TAG: ${{ secrets.DOCKER_USER }}/quickbihar-server:prod
      WEB_TAG: ${{ secrets.DOCKER_USER }}/quickbihar-web:prod
      SHA_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # ---------------- SERVER ----------------
      - name: Build & Push Server Image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.SERVER_TAG }}
            ${{ secrets.DOCKER_USER }}/quickbihar-server:${{ github.sha }}

      # ---------------- WEB ----------------
      - name: Build & Push Web Image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_TAG }}
            ${{ secrets.DOCKER_USER }}/quickbihar-web:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: self-hosted

    env:
      COMPOSE_FILE: docker-compose.yml

    steps:
      - name: Checkout repo on VPS
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Pull latest images
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} pull

      - name: Deploy with minimal downtime
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} up -d --remove-orphans

      - name: Verify services
        run: |
          docker compose -f ${{ env.COMPOSE_FILE }} ps

      - name: Cleanup unused Docker resources
        run: |
          docker image prune -f
          docker system prune -f
